# Smoke-test config for the in-sandbox CI run. Tiny step counts on
# synthetic data — proves the pipeline ends-to-end without trying to
# learn anything credible.
experiment:
  name: ppo_filter_smoke
  algorithm: PPO
  policy: MlpPolicy
  feature_pipeline: equities_features_v001
  universe: synthetic
  reward_config_version: reward_v001

  train_start: "2018-01-01"
  train_end:   "2020-12-31"
  validation_start: "2021-01-01"
  validation_end:   "2021-06-30"
  test_start: "2021-07-01"
  test_end:   "2021-12-31"

  total_timesteps_initial: 8000
  total_timesteps_max: 20000
  eval_interval_timesteps: 4000
  early_stopping_patience_evaluations: 3
  min_validation_delta: 0.0
  save_best_only: true

  seeds: [11]

  hyperparams:
    learning_rate: 3.0e-4
    n_steps: 256
    batch_size: 64
    n_epochs: 4
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    policy_kwargs:
      net_arch: [64, 64]

  cost_model:
    base_spread_bps: 3.0
    base_slippage_bps: 5.0
    high_volatility_slippage_multiplier: 2.0
    event_window_slippage_multiplier: 1.0
    market_impact_coef: 0.10
    adverse_selection_bps: 2.0

  reward:
    transaction_cost_bps: 5.0
    drawdown_penalty_weight: 0.10
    turnover_penalty_weight: 0.02
    holding_period_penalty_weight: 0.05

  data_provider: synthetic_momentum

  artifact_root: data/models/
