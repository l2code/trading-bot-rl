# PPO trade-filter v001 experiment
experiment:
  name: ppo_filter_v001
  algorithm: PPO
  policy: MlpPolicy
  feature_pipeline: equities_features_v001
  universe: starter_equities
  reward_config_version: reward_v001

  # Training data ranges. Walk-forward harness shifts these per cycle.
  train_start: "2014-01-01"
  train_end:   "2020-12-31"
  validation_start: "2021-01-01"
  validation_end:   "2021-12-31"
  test_start: "2022-01-01"
  test_end:   "2022-12-31"

  # Steps. Smoke test overrides via CLI: --total-timesteps 10000.
  total_timesteps_initial: 500000
  total_timesteps_max: 2000000
  eval_interval_timesteps: 50000
  early_stopping_patience_evaluations: 10
  min_validation_delta: 0.01
  save_best_only: true

  seeds: [11, 22, 33, 44, 55]

  hyperparams:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    policy_kwargs:
      net_arch: [128, 128]

  cost_model:
    base_spread_bps: 3.0
    base_slippage_bps: 5.0
    high_volatility_slippage_multiplier: 2.0
    event_window_slippage_multiplier: 2.0
    market_impact_coef: 0.10
    adverse_selection_bps: 2.0

  reward:
    transaction_cost_bps: 5.0
    drawdown_penalty_weight: 0.10
    # Bumped from 0.02 → 0.30: prior weight was so small relative to
    # take-side risk-adjusted reward (±5 clipped) that "always take"
    # was the optimal policy regardless of candidate quality.
    turnover_penalty_weight: 0.30
    holding_period_penalty_weight: 0.05
    # Full mirror: skip rewards = -clipped(counterfactual_return /
    # target_risk_pct). Combined with the bumped turnover penalty,
    # this ensures both "always take" and "always skip" are strictly
    # dominated by a discriminating policy.
    skip_counterfactual_scale: 1.0

  artifact_root: data/models/
