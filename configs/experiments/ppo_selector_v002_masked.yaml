# MaskablePPO multi-strategy selector v002 — FEAT-29.
#
# Identical to ppo_selector_v002.yaml in every dimension EXCEPT:
#   - algorithm: MaskablePPO (sb3-contrib) instead of PPO.
#   - rl_variant: selector_v002_masked (env exposes action_masks()
#                 over fired strategy slots; inference uses
#                 MaskablePpoSelectorScorer).
#
# Operator scope (2026-05-06): reuse the EXACT Phase-0 seeds /
# windows / hyperparams / reward as the audit-v2 unmasked run so the
# A/B isolates the masking effect. The decision criterion is beating
# selector_baseline_random (audit-v2 score 0.7186) on the Phase-24
# gate, NOT merely escaping the all-skip attractor.
experiment:
  name: ppo_selector_v002_masked
  algorithm: MaskablePPO
  policy: MlpPolicy
  feature_pipeline: equities_features_v001
  universe: starter_equities
  reward_config_version: reward_v001

  rl_variant: selector_v002_masked

  # Same windows as the audit-v2 unmasked run.
  train_start: "2014-01-01"
  train_end:   "2020-12-31"
  validation_start: "2021-01-01"
  validation_end:   "2021-12-31"
  test_start: "2022-01-01"
  test_end:   "2022-12-31"

  total_timesteps_initial: 500000
  total_timesteps_max: 2000000
  eval_interval_timesteps: 50000
  early_stopping_patience_evaluations: 10
  min_validation_delta: 0.01
  save_best_only: true

  # Phase-0 seeds — same set the unmasked v002 ran on. Lets us
  # compare bit-for-bit per-seed, not just aggregate.
  seeds: [11, 22, 33]

  hyperparams:
    # Identical to ppo_selector_v002.yaml. The whole point of this
    # YAML is to test masking at the same hyperparams; tuning ent_coef
    # / lr is #8's job (deferred behind this).
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    policy_kwargs:
      net_arch: [128, 128]

  cost_model:
    base_spread_bps: 3.0
    base_slippage_bps: 5.0
    high_volatility_slippage_multiplier: 2.0
    event_window_slippage_multiplier: 2.0
    market_impact_coef: 0.10
    adverse_selection_bps: 2.0

  reward:
    # Identical to ppo_selector_v002.yaml — FIX-#49 calibration.
    drawdown_penalty_weight: 0.10
    turnover_penalty_weight: 0.05
    holding_period_penalty_weight: 0.02
    skip_counterfactual_scale: 1.0
    skip_counterfactual_mode: highest_signal

  artifact_root: data/models/
