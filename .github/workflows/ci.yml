name: ci

# Manual-only per OPS-45 — local verification is the merge gate
# (CONTRIBUTING.md §6, SDLC_LESSONS_FOR_NEW_PROJECT.md §2.2). CI
# kept as a catch-net the operator can run from the UI when
# wanted. Avoid auto-running on every push/PR to keep GitHub
# Actions cost down for a small team where local pytest+ruff is
# faster and more reliable.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src tests

      - name: Tests + coverage gate (>=85%)
        run: |
          pytest tests/ \
            --cov=rl_swing \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-fail-under=85
